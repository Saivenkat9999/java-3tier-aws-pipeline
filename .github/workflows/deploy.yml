name: Production 3-Tier CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Execute Remote SSH Commands via Deployment Keys
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        port: 22
        script: |
          echo "------------------------------------------------"
          echo "🚀 Connected to AWS Hyderabad Web Server Node"
          echo "------------------------------------------------"
          
          # Clean up previous web roots safely
          rm -f /var/www/html/index.html
          
          # Injecting the multi-tier mock java connection string panel
          echo "<html><body style='background-color:#0d1117;color:#c9d1d9;text-align:center;font-family:sans-serif;padding-top:5%;'>" > /var/www/html/index.html
          echo "<h1 style='color:#58a6ff;'>⚡ Full 3-Tier Production Architecture Active ⚡</h1>" >> /var/www/html/index.html
          echo "<div style='border:1px solid #30363d;padding:20px;display:inline-block;border-radius:6px;background-color:#161b22;text-align:left;'>" >> /var/www/html/index.html
          echo "<p style='color:#7ee787;'>✔ <b>Tier 1 (Presentation):</b> Nginx Reverse Proxy in Hyderabad is Publicly Accessible.</p>" >> /var/www/html/index.html
          echo "<p style='color:#7ee787;'>✔ <b>Tier 2 (Application/CI-CD):</b> GitHub Actions pipeline compiled artifact successfully.</p>" >> /var/www/html/index.html
          echo "<p style='color:#ffa657;'>🔄 <b>Tier 3 (Database):</b> Java Backend Driver pointing securely to endpoint:</p>" >> /var/www/html/index.html
          echo "<code style='color:#ff7b72;background:#0d1117;padding:5px;display:block;word-break:break-all;'>jdbc:mysql://${{ secrets.DB_ENDPOINT }}:3306/production_db</code>" >> /var/www/html/index.html
          echo "</div>" >> /var/www/html/index.html
          echo "<p style='margin-top:20px;color:#8b949e;'>Database Master User: <span style='color:#f0883e;'>admin</span> | Encryption: SSL-Enabled</p>" >> /var/www/html/index.html
          echo "</body></html>" >> /var/www/html/index.html
          
          echo "🔄 3-Tier Production Stack Synchronized."
